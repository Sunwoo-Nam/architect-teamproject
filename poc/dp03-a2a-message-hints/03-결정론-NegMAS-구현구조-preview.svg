<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1600" viewBox="0 0 1600 1600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
    <style>
      .title{font:700 22px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#1f2937}
      .lane{fill:#f8fafc;stroke:#cbd5e1;stroke-width:1.4}
      .lane-title{font:700 15px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#334155}
      .box-title{font:700 14px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
      .box-text{font:13px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
      .note{font:14px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#334155}
      .edge{fill:none;stroke:#64748b;stroke-width:2;marker-end:url(#arrow)}
      .edge-blue{fill:none;stroke:#3b82f6;stroke-width:2;marker-end:url(#arrow)}
      .edge-purple{fill:none;stroke:#8b5cf6;stroke-width:2;marker-end:url(#arrow)}
      .edge-gray{fill:none;stroke:#64748b;stroke-width:2;marker-end:url(#arrow)}
      .edge-teal{fill:none;stroke:#0d9488;stroke-width:2;marker-end:url(#arrow)}
      .edge-pink{fill:none;stroke:#be185d;stroke-width:2;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="1600" height="1600" fill="#ffffff"/>
  <text x="800" y="46" text-anchor="middle" class="title">DP03 A2A 협상 메시지 구조 PoC - Track A 결정론 NegMAS 구현구조</text>

  <rect x="40" y="80" width="230" height="500" class="lane"/>
  <text x="155" y="102" text-anchor="middle" class="lane-title">입력 계약</text>
  <rect x="65" y="135" width="180" height="85" rx="8" fill="#dbeafe" stroke="#2563eb"/>
  <text x="155" y="162" text-anchor="middle" class="box-title" fill="#1e3a8a">Scenario YAML</text>
  <text x="155" y="184" text-anchor="middle" class="box-text" fill="#1e3a8a">01 스키마 준수</text>
  <text x="155" y="204" text-anchor="middle" class="box-text" fill="#1e3a8a">120/180 synthetic set</text>
  <rect x="65" y="255" width="180" height="85" rx="8" fill="#e0f2fe" stroke="#0284c7"/>
  <text x="155" y="282" text-anchor="middle" class="box-title" fill="#075985">Run Config</text>
  <text x="155" y="304" text-anchor="middle" class="box-text" fill="#075985">experiment_group</text>
  <text x="155" y="324" text-anchor="middle" class="box-text" fill="#075985">n_steps / seed</text>
  <rect x="65" y="375" width="180" height="95" rx="8" fill="#fee2e2" stroke="#dc2626"/>
  <text x="155" y="404" text-anchor="middle" class="box-title" fill="#7f1d1d">Legacy PoC 미사용</text>
  <text x="155" y="428" text-anchor="middle" class="box-text" fill="#7f1d1d">poc/dp03-privacy 결과</text>
  <text x="155" y="448" text-anchor="middle" class="box-text" fill="#7f1d1d">입력/근거 제외</text>

  <rect x="310" y="80" width="220" height="500" class="lane"/>
  <text x="420" y="102" text-anchor="middle" class="lane-title">시나리오 준비</text>
  <rect x="335" y="160" width="170" height="80" rx="8" fill="#dcfce7" stroke="#16a34a"/>
  <text x="420" y="190" text-anchor="middle" class="box-title" fill="#14532d">Scenario Loader</text>
  <text x="420" y="212" text-anchor="middle" class="box-text" fill="#14532d">YAML → 내부 모델</text>
  <rect x="335" y="300" width="170" height="95" rx="8" fill="#ecfdf5" stroke="#059669"/>
  <text x="420" y="326" text-anchor="middle" class="box-title" fill="#064e3b">Pre-run Validator</text>
  <text x="420" y="350" text-anchor="middle" class="box-text" fill="#064e3b">schema / PII / weight</text>
  <text x="420" y="370" text-anchor="middle" class="box-text" fill="#064e3b">agreement region</text>

  <rect x="570" y="80" width="245" height="500" class="lane"/>
  <text x="692" y="102" text-anchor="middle" class="lane-title">협상 모델 구성</text>
  <rect x="600" y="125" width="185" height="85" rx="8" fill="#fef3c7" stroke="#d97706"/>
  <text x="692" y="153" text-anchor="middle" class="box-title" fill="#78350f">OutcomeSpace Builder</text>
  <text x="692" y="176" text-anchor="middle" class="box-text" fill="#78350f">domain.issues</text>
  <text x="692" y="196" text-anchor="middle" class="box-text" fill="#78350f">→ tuple outcomes</text>
  <rect x="600" y="255" width="185" height="95" rx="8" fill="#ffedd5" stroke="#ea580c"/>
  <text x="692" y="282" text-anchor="middle" class="box-title" fill="#7c2d12">Utility Evaluator</text>
  <text x="692" y="306" text-anchor="middle" class="box-text" fill="#7c2d12">linear_additive</text>
  <text x="692" y="326" text-anchor="middle" class="box-text" fill="#7c2d12">reservation / constraints</text>
  <rect x="600" y="395" width="185" height="95" rx="8" fill="#fae8ff" stroke="#a21caf"/>
  <text x="692" y="423" text-anchor="middle" class="box-title" fill="#581c87">Hint Projection</text>
  <text x="692" y="446" text-anchor="middle" class="box-text" fill="#581c87">preference / flexibility</text>
  <text x="692" y="466" text-anchor="middle" class="box-text" fill="#581c87">허용 bucket만 생성</text>

  <rect x="865" y="240" width="190" height="135" rx="8" fill="#ede9fe" stroke="#7c3aed"/>
  <text x="960" y="273" text-anchor="middle" class="box-title" fill="#4c1d95">Experiment Router</text>
  <text x="960" y="296" text-anchor="middle" class="box-title" fill="#4c1d95">+ Fallback Gate</text>
  <text x="960" y="326" text-anchor="middle" class="box-text" fill="#4c1d95">capability와</text>
  <text x="960" y="346" text-anchor="middle" class="box-text" fill="#4c1d95">schema version 확인</text>

  <rect x="1110" y="105" width="210" height="90" rx="8" fill="#eff6ff" stroke="#3b82f6"/>
  <text x="1215" y="133" text-anchor="middle" class="box-title" fill="#1e3a8a">A1_DET_OFFER_ONLY</text>
  <text x="1215" y="157" text-anchor="middle" class="box-text" fill="#1e3a8a">OfferOnlyNegotiator x2</text>
  <text x="1215" y="177" text-anchor="middle" class="box-text" fill="#1e3a8a">hint 없음</text>
  <rect x="1110" y="245" width="210" height="100" rx="8" fill="#f5f3ff" stroke="#8b5cf6"/>
  <text x="1215" y="273" text-anchor="middle" class="box-title" fill="#4c1d95">A2_DET_HINT_AWARE</text>
  <text x="1215" y="297" text-anchor="middle" class="box-text" fill="#4c1d95">HintAwareNegotiator x2</text>
  <text x="1215" y="317" text-anchor="middle" class="box-text" fill="#4c1d95">hint는 후보 정렬에만 사용</text>
  <rect x="1110" y="395" width="210" height="100" rx="8" fill="#f1f5f9" stroke="#64748b"/>
  <text x="1215" y="423" text-anchor="middle" class="box-title" fill="#334155">A3_DET_FALLBACK</text>
  <text x="1215" y="447" text-anchor="middle" class="box-text" fill="#334155">hint 미지원/버전 불일치</text>
  <text x="1215" y="467" text-anchor="middle" class="box-text" fill="#334155">OfferOnly로 강제</text>

  <rect x="1365" y="245" width="195" height="105" rx="8" fill="#ccfbf1" stroke="#0d9488"/>
  <text x="1462" y="274" text-anchor="middle" class="box-title" fill="#134e4a">NegMAS SAOMechanism</text>
  <text x="1462" y="300" text-anchor="middle" class="box-text" fill="#134e4a">1:1 SAO negotiation</text>
  <text x="1462" y="322" text-anchor="middle" class="box-text" fill="#134e4a">outcomes + n_steps</text>
  <rect x="1365" y="425" width="195" height="105" rx="8" fill="#f0fdfa" stroke="#14b8a6"/>
  <text x="1462" y="454" text-anchor="middle" class="box-title" fill="#134e4a">Trace + Event Log</text>
  <text x="1462" y="480" text-anchor="middle" class="box-text" fill="#134e4a">offer / response</text>
  <text x="1462" y="502" text-anchor="middle" class="box-text" fill="#134e4a">hint / threshold / fallback</text>

  <rect x="1035" y="610" width="200" height="105" rx="8" fill="#fce7f3" stroke="#db2777"/>
  <text x="1135" y="639" text-anchor="middle" class="box-title" fill="#831843">Post-run Validator</text>
  <text x="1135" y="665" text-anchor="middle" class="box-text" fill="#831843">agreement / reservation</text>
  <text x="1135" y="687" text-anchor="middle" class="box-text" fill="#831843">hard constraint / leak</text>
  <rect x="1280" y="610" width="210" height="105" rx="8" fill="#fdf2f8" stroke="#be185d"/>
  <text x="1385" y="639" text-anchor="middle" class="box-title" fill="#831843">Metrics Calculator</text>
  <text x="1385" y="665" text-anchor="middle" class="box-text" fill="#831843">rounds / utility / Pareto</text>
  <text x="1385" y="687" text-anchor="middle" class="box-text" fill="#831843">hint_sensitivity_score</text>
  <rect x="1280" y="760" width="210" height="80" rx="8" fill="#e2e8f0" stroke="#475569"/>
  <text x="1385" y="790" text-anchor="middle" class="box-title" fill="#1e293b">Comparison Summary</text>
  <text x="1385" y="814" text-anchor="middle" class="box-text" fill="#1e293b">A1 vs A2 vs A3</text>

  <rect x="330" y="760" width="820" height="50" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="740" y="790" text-anchor="middle" class="note">핵심 경계: hint는 NegMAS OutcomeSpace가 아니라 runner의 A2A envelope metadata로 관리한다.</text>

